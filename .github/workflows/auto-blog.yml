name: AI Blog Autopilot

on:
  schedule:
    # Runs at 00:00 every 2 days
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate AI Blog Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-blog-post.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "Ascentia Autopilot"
          git config --global user.email "autopilot@ascentia.academy"
          git add src/data/posts.json
          git diff-index --quiet HEAD || git commit -m "chore: AI auto-generated blog post [skip ci]"
          git push
